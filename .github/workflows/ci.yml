name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  stitch-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Analyze Stitch exports
        run: npm run stitch:analyze

      - name: Validate marketing page files
        run: |
          test -f marketing/index.html
          test -f marketing/style.css
          test -f stitch-export/README.md

  baseline-health:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (non-blocking baseline report)
        run: npm run lint

      - name: Type check (non-blocking baseline report)
        run: npm run type-check
